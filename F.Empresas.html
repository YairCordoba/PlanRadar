    <script>
      document.getElementById('registrationForm').addEventListener('submit', function (event) {
        event.preventDefault(); // Evita que la página se recargue

        // Obtener los valores de los inputs
        const nombre_empresa = document.querySelector('input[name="nombre_empresa"]').value;
        const correo = document.querySelector('input[name="correo"]').value;

        // Mostrar el mensaje flotante con los datos ingresados
        const popupMessage = document.getElementById('popupMessage');
        popupMessage.innerHTML = `¡Registro exitoso! Te hemos enviado una confirmación a tu correo: ${correo}`;
        popupMessage.classList.add('show');

        // Ocultar el mensaje después de 5 segundos
        setTimeout(function () {
          popupMessage.classList.remove('show');
        }, 5000);

        // Aquí podrías hacer una solicitud AJAX para enviar los datos a un servidor si lo deseas
      });
